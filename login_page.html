<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Document</title>
    <style>
        :root {
            /* Color */
            --primary: #4B90FF;
            --secondary: #00379D;
            --success: #1ca13b;
            --background: #FFF;

            /* Border Radius */
            --roundedLarge: 20px;
            --roundedSmall: 10px;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 35px;
        }
        input {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container shadow rounded p-4 mx-auto my-5 text-center" style="max-width: 400px;">
        <h2 style="margin-bottom: 0;">Welcome to</h2>
        <h1 class="">TASKFINDER</h1>
        <input type="username" placeholder="Username/Email" minlength="3" maxlength="20"/>
        <input type="password" placeholder="Password" minlength="3" maxlength="500"/>
        <br>
        <br>
        <button class="btn btn-primary">LOGIN</button>
        <p>No account yet?</p>
        <button class="btn btn-success">SIGN IN</button>
    </div>
</body>
</html>
