<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Document</title>
    <style>
        :root {
            /* Color */
            --primary: #4B90FF;
            --secondary: #00379D;
            --success: #4BDE80;
            --background: #FFF;
            --backgroundContainer: #1F2130;
            --backgroundContainerInner: #272B3D;

            /* Border Radius */
            --roundedLarge: 20px;
            --roundedSmall: 10px;
        
            /* Typography */
            --textMd: 16px;
            --textLg: 28px;
            --textXl: 36px;

            /* Spacing and Margin */
            --spaceMd: 20px;
        }
        h1 {
            color: var(--primary);
        }
        input {
            margin-bottom: 30px;
        }

        body.bg-dark p, body.bg-dark a{
            color: white !important;
            text-decoration: none;
        }

        body.bg-dark .container {
            background: var(--backgroundContainer);
            border: 1px solid grey;
            border-radius: var(--roundedSmall);
            padding: var(--spaceMd);
        }

        body.bg-dark .container .container {
            background: var(--backgroundContainerInner);
            border: 0;
            border-radius: var(--roundedSmall);
            padding: var(--spaceMd);
        }

        body.bg-dark .container h4 {
            color: var(--success);
            font-size: var(--textMd);
            text-transform: uppercase;
        }

        .summary-value {
            font-weight: bold;
            font-size: var(--textLg);
            margin-bottom: 0;
        }

        .summary-value-large {
            font-weight: 800;
            font-size: var(--textXl);
            margin-bottom: 0;
        }

        .container.summary-box {
            text-align: center;
        }

        .progress-bar {
            background-color: var(--success);
        }

        .progress {
            background-color: var(--backgroundContainerInner)
        }

        .circle {
            width: 10px;
            height: 10px;
            border-radius: 100%;
            background-color: var(--backgroundContainerInner);
        }
    </style>
</head>
<body class="bg-dark p-4">
    <h1 class="fw-bold">Announcements</h1>
    <p>Sunday, 19th of April 2026</p>
    <div>
        <div class="container rounded-lg mb-4">
            <div class="row">
                <div class="col-lg-4 col-md-5 col-sm-12">
                    <img src="" alt="" class="img img-fluid">
                </div>
                <div class="col-lg-8 col-md-7 col-sm-12S">
                    <h4>Informasi Libur Random</h4>
                    <hr style="height:3px; background-color: grey; border:none;"/>
                    <p>desc</p>
                    <div class="d-flex justify-content-between">
                        <p class="mb-0">author</p>
                        <p class="mb-0">date</p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    <script>
        
    </script>
</body>
</html>
