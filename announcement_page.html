<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script>
    <title>Document</title>
    <style>
        :root {
            /* Color */
            --primary: #4B90FF;
            --secondary: #00379D;
            --success: #4BDE80;
            --background: #FFF;
            --backgroundContainer: #1F2130;
            --backgroundContainerInner: #272B3D;

            /* Border Radius */
            --roundedLarge: 20px;
            --roundedSmall: 10px;
        
            /* Typography */
            --textMd: 16px;
            --textLg: 28px;
            --textXl: 36px;

            /* Spacing and Margin */
            --spaceMd: 20px;
        }
        h1 {
            color: var(--primary);
        }
        input {
            margin-bottom: 30px;
        }

        body.bg-dark p, body.bg-dark a{
            color: white !important;
            text-decoration: none;
        }

        body.bg-dark .container {
            background: var(--backgroundContainer);
            border: 1px solid grey;
            border-radius: var(--roundedSmall);
            padding: var(--spaceMd);
        }

        body.bg-dark .container .container {
            background: var(--backgroundContainerInner);
            border: 0;
            border-radius: var(--roundedSmall);
            padding: var(--spaceMd);
        }

        body.bg-dark .container h4 {
            color: var(--success);
            font-size: var(--textMd);
            text-transform: uppercase;
        }

        .summary-value {
            font-weight: bold;
            font-size: var(--textLg);
            margin-bottom: 0;
        }

        .summary-value-large {
            font-weight: 800;
            font-size: var(--textXl);
            margin-bottom: 0;
        }

        .container.summary-box {
            text-align: center;
        }

        .form-control, .form-textarea {
            background: none !important;
            border-radius: var(--roundedLarge);
            color: white !important;
        }

        .progress-bar {
            background-color: var(--success);
        }

        .progress {
            background-color: var(--backgroundContainerInner)
        }

        .circle {
            width: 10px;
            height: 10px;
            border-radius: 100%;
            background-color: var(--backgroundContainerInner);
        }
    </style>
</head>
<body class="bg-dark p-4">
    <h1 class="fw-bold">Announcements</h1>
    <p>Sunday, 19th of April 2026</p>
    <div>
        <input type="text" id="searchQuery" class="form-control">
    </div>
    <div id="announcementHolder">
        <p>Loading...</p>
    </div>
    <script>
        async function getAnnouncements(search) {
            const holder = "announcementHolder"
            $(`#${holder}`).html("<p>Loading...</p>")
            
            let searchQuery = "global"
            if (search) searchQuery = search

            // fetching api
            const res = await fetch(`https://newsapi.org/v2/everything?q=${searchQuery}&sortBy=publishedAt&apiKey=APIKEY`)
            const data = await res.json()
            if (!data) return
            console.log(data.articles)

            // build element
            let announcementsElement = ""
            data.articles.forEach(ann => {
                announcementsElement += `
                    <div class="container rounded-lg mb-4">
                        <div class="row">
                            <div class="col-lg-4 col-md-5 col-sm-12">
                                <img src="${ann.urlToImage}" alt="${ann.urlToImage}" class="img img-fluid">
                            </div>
                            <div class="col-lg-8 col-md-7 col-sm-12S">
                                <h4>${ann.title}</h4>
                                <hr style="height:3px; background-color: grey; border:none;"/>
                                <p>${ann.description}</p>
                                <div class="d-flex justify-content-between">
                                    <p class="mb-0">${ann.author ?? "<span class='text-secondary fst-italic'>No Author</span>"}</p>
                                    <p class="mb-0">${ann.publishedAt}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            });
            
            // render element
            document.getElementById(holder).innerHTML = announcementsElement
        }
        getAnnouncements(null)
        
        $(document).on('blur',"#searchQuery", function(){
            const search = $(this).val().trim()
            getAnnouncements(search)
        })
    </script>
</body>
</html>
