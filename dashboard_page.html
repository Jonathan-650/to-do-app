<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/8a4011c742.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <title>Document</title>
    <style>
        :root {
            /* Color */
            --primary: #4B90FF;
            --secondary: #00379D;
            --success: #4BDE80;
            --background: #FFF;
            --backgroundContainer: #1F2130;
            --backgroundContainerInner: #272B3D;

            /* Border Radius */
            --roundedLarge: 20px;
            --roundedSmall: 10px;
        
            /* Typography */
            --textMd: 16px;
            --textLg: 28px;
            --textXl: 36px;

            /* Spacing and Margin */
            --spaceMd: 20px;
        }
        h1 {
            color: var(--primary);
        }
        input {
            margin-bottom: 30px;
        }

        body.bg-dark p, body.bg-dark a{
            color: white !important;
            text-decoration: none;
        }

        body.bg-dark .container, .modal-content {
            background: var(--backgroundContainer);
            border: 1px solid grey;
            border-radius: var(--roundedSmall);
            padding: var(--spaceMd);
        }

        .form-control, .form-textarea {
            background: none !important;
            border-radius: var(--roundedLarge);
            color: white !important;
        }

        .modal-body {
            color: white;
        }

        body.bg-dark .container .container {
            background: var(--backgroundContainerInner);
            border: 0;
            border-radius: var(--roundedSmall);
            padding: var(--spaceMd);
        }

        body.bg-dark .container h2 {
            color: var(--success);
            font-size: var(--textMd);
            text-transform: uppercase;
        }

        .summary-value {
            font-weight: bold;
            font-size: var(--textLg);
            margin-bottom: 0;
        }

        .summary-value-large {
            font-weight: 800;
            font-size: var(--textXl);
            margin-bottom: 0;
        }

        .container.summary-box {
            text-align: center;
        }

        .progress-bar {
            background-color: var(--success);
        }

        .progress {
            background-color: var(--backgroundContainerInner)
        }

        .circle {
            width: 10px;
            height: 10px;
            border-radius: 100%;
            background-color: var(--backgroundContainerInner);
        }
    </style>
</head>
<body class="bg-dark p-4">
    <h1 class="fw-bold">My Dashboard</h1>
    <p>Sunday, 19th of April 2026</p>
    <div class="row">
        <div class="col-lg-6 col-md-12">
            <div class="container rounded-lg mb-4">
                <h2>Task Summary</h2>
                <div class="row">
                    <div class="col-6">
                        <div class="container summary-box mb-2">
                            <p class="summary-value">12</p>
                            <p>Total Tasks</p>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="container summary-box mb-2">
                            <p class="summary-value text-success">12</p>
                            <p>Completed</p>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="container summary-box">
                            <p class="summary-value text-primary">12</p>
                            <p>In progress</p>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="container summary-box">
                            <p class="summary-value text-danger">12</p>
                            <p>Overdue</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="container rounded-lg mb-4">
                <h2>All Users</h2>
                <div id="userSelectionHolder">
                    <p>Loading...</p>
                </div>
            </div>
            <div class="container rounded-lg">
                <h2>Progress Completion</h2>
                <p class="summary-value-large">0<span style="font-size: var(--textMd)" class="text-secondary">%</span></p>
                <p class="text-secondary">0 out of 1000 tasks completed today</p>
                <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress-bar" style="width: 25%"></div>
                </div>
                <div class="d-flex mt-3 align-items-center gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <div class="circle bg-success"></div>
                        <a class="me-3" style="white-space: nowrap;">Completed (65%)</a>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <div class="circle"></div>
                        <a class="me-3" style="white-space: nowrap;">Remaining (35%)</a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Button trigger modal -->
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal"
        style="width:60px; height:60px; position:fixed; bottom:20px; right: 20px; border-radius:100%">
        <i class="fa-solid fa-plus"></i>
        </button>

        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Add Task</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form>
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control">
                    <label class="form-label">Description</label>
                    <br>
                    <textarea class="form-textarea w-100" style="min-height: 100px;"></textarea>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary">Save changes</button>
            </div>
            </div>
        </div>
        </div>
    </div>
    <script>
        async function getUsers() {
            const holder = "userSelectionHolder"
            
            // fetching api
            const res = await fetch("https://jsonplaceholder.typicode.com/users")
            const data = await res.json()
            console.log(data)

            // build element
            let buttonElement = `<button class="btn btn-secondary mb-2 me-2">All</button>`
            data.forEach(user => {
                buttonElement += `<button class="btn btn-secondary mb-2 me-2">${user.name}</button>`
            });
            
            // render element
            document.getElementById(holder).innerHTML = buttonElement
        }
        getUsers()
    </script>
</body>
</html>
